name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install root dependencies
        run: npm ci

      - name: Install function dependencies (lirr)
        run: npm ci
        working-directory: functions/getLIRRDepartures

      - name: Install function dependencies (ferry)
        run: npm ci
        working-directory: functions/getFerrySchedule

      - name: Build frontend
        run: npm run build

      - name: Deploy to Firebase
        run: npx firebase deploy --non-interactive
